<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bem-vindo à IEBI</title>
  <link rel="icon" type="image/png" href="../assets/favico.png">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <!-- Google Fonts para tipografia premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #27AE60;
      --primary-dark: #0F4C3A;
      --bg-gradient: linear-gradient(135deg, #0F4C3A 0%, #06241b 100%);
      --text-dark: #1A1A1A;
      --text-muted: #666666;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    html {
      font-size: 115%;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 12px 20px 40px;
    }

    /* Fundo decorativo animado */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      background: rgba(39, 174, 96, 0.15);
      filter: blur(60px);
      z-index: 0;
      animation: float 10s infinite ease-in-out alternate;
    }

    .shape-1 {
      width: 400px;
      height: 400px;
      top: -100px;
      left: -100px;
    }

    .shape-2 {
      width: 300px;
      height: 300px;
      bottom: -50px;
      right: -50px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(30px, 30px) scale(1.1);
      }
    }

    /* Cartão Principal Glassmorphism */
    .premium-card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 460px;
      border-radius: 24px;
      padding: 24px 32px 40px 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    .header-logo {
      display: block;
      margin: 0 auto 8px;
      height: 50px;
    }

    .welcome-text {
      text-align: center;
      margin-bottom: 20px;
    }

    .welcome-text h1 {
      font-size: 1.8rem;
      color: var(--primary-dark);
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .welcome-text p {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 300;
      padding-bottom: 12px;
    }

    /* Inputs Animados (Floating Label) */
    .floating-group {
      position: relative;
      margin-bottom: 36px;
    }

    .floating-group input,
    .floating-group textarea {
      width: 100%;
      border: none;
      border-bottom: 2px solid #E0E0E0;
      background: transparent;
      /* Aqui */
      padding: 16px 0 0px;
      font-size: 1rem;
      color: var(--text-dark);
      outline: none;
      transition: all 0.3s ease;
    }

    .floating-group input:focus,
    .floating-group textarea:focus {
      border-bottom-color: var(--primary);
    }

    .floating-group label {
      position: absolute;
      left: 0;
      top: 12px;
      color: #999;
      font-size: 1rem;
      font-weight: 400;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    /* Estado Focado ou Preenchido */
    .floating-group input:focus~label,
    .floating-group input:not(:placeholder-shown)~label,
    .floating-group textarea:focus~label,
    .floating-group textarea:not(:placeholder-shown)~label {
      top: -12px;
      font-size: 0.75rem;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Section Titulos */
    .section-title {
      font-size: 0.85rem;
      color: var(--primary-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 800;
      margin: 32px 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title i {
      font-size: 1.2rem;
      color: var(--primary);
    }

    /* Estilo Premium para Radios e Checkboxes */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      /* Aqui */
      margin-bottom: 26px;
    }

    .option-card {
      position: relative;
      cursor: pointer;
    }

    .option-card input {
      position: absolute;
      opacity: 0;
      cursor: pointer;
    }

    .option-card .card-content {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      border: 2px solid #E0E0E0;
      border-radius: 12px;
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .option-card:hover .card-content {
      border-color: #BDBDBD;
      background: #F8F9FA;
    }

    .option-card input:checked~.card-content {
      border-color: var(--primary);
      background: rgba(39, 174, 96, 0.05);
      color: var(--primary-dark);
      box-shadow: 0 4px 12px rgba(39, 174, 96, 0.15);
    }

    /* Checkbox único */
    .single-checkbox {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      /* Aqui */
      margin-bottom: 28px;
    }

    .single-checkbox input {
      width: 24px;
      height: 24px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .single-checkbox span {
      font-size: 0.95rem;
      color: var(--text-dark);
      font-weight: 400;
    }

    /* Botão Animado */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 1px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 10px 20px rgba(39, 174, 96, 0.2);
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(39, 174, 96, 0.3);
    }

    .btn-submit:active {
      transform: translateY(1px);
    }
  </style>
</head>

<body>

  <!-- Elementos de fundo -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <!-- Cartão do Formulário -->
  <div class="premium-card">
    <img src="../assets/Logo.png" alt="IEBI Logo" class="header-logo">

    <div class="welcome-text">
      <h1>Bem-vindo(a) à IEBI!</h1>
      <p>Queremos te conhecer melhor. É rápido!</p>
    </div>

    <form id="formVisitantePremium">

      <!-- Campos Flutuantes -->
      <div class="floating-group">
        <!-- placeholder=" " é um truque para o CSS :placeholder-shown funcionar -->
        <input type="text" id="nome" name="nome" placeholder=" " required>
        <label for="nome">Nome Completo</label>
      </div>

      <div class="floating-group">
        <input type="tel" id="whatsapp" name="whatsapp" placeholder=" " required>
        <label for="whatsapp">WhatsApp</label>
      </div>



      <!-- Seção: Vida Espiritual -->
      <!-- <div class="section-title">
        <i class="ph-fill ph-heart"></i> Vida Espiritual
      </div> -->

      <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 600;">Você já é cristão?
      </p>
      <div class="options-grid">
        <label class="option-card">
          <input type="radio" name="e_cristao" value="Sim" checked>
          <div class="card-content">Sim</div>
        </label>
        <label class="option-card">
          <input type="radio" name="e_cristao" value="Não">
          <div class="card-content">Não</div>
        </label>
      </div>

      <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; font-weight: 600;">Áreas de Interesse
      </p>
      <div class="options-grid">
        <label class="option-card">
          <input type="checkbox" name="interesses" value="Células" checked>
          <div class="card-content">Células</div>
        </label>
        <label class="option-card">
          <input type="checkbox" name="interesses" value="Jovens">
          <div class="card-content">Jovens</div>
        </label>
        <label class="option-card">
          <input type="checkbox" name="interesses" value="Cursos">
          <div class="card-content">Cursos</div>
        </label>
        <label class="option-card">
          <input type="checkbox" name="interesses" value="Outro">
          <div class="card-content">Outro</div>
        </label>
      </div>

      <div class="floating-group" style="margin-top: 32px;">
        <textarea id="pedido_oracao" name="pedido_oracao" rows="1" placeholder=" "></textarea>
        <label for="pedido_oracao">Pedido de Oração (Opcional)</label>
      </div>

      <label class="single-checkbox">
        <input type="checkbox" name="autoriza_whatsapp" value="Sim" checked>
        <span>Autorizo contato via WhatsApp.</span>
      </label>

      <button type="submit" class="btn-submit">CONCLUIR CADASTRO</button>

    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Máscara para WhatsApp
      const whatsappInput = document.getElementById('whatsapp');
      if (whatsappInput) {
        whatsappInput.addEventListener('input', (e) => {
          let value = e.target.value.replace(/\D/g, "");
          if (value.length > 10) {
            value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, "($1) $2-$3");
          } else if (value.length > 6) {
            value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, "($1) $2-$3");
          } else if (value.length > 2) {
            value = value.replace(/^(\d{2})(\d{0,5}).*/, "($1) $2");
          }
          e.target.value = value;
        });
      }

      // Expansão suave do textarea
      const textarea = document.getElementById('pedido_oracao');
      if (textarea) {
        textarea.addEventListener('input', function () {
          this.style.height = 'auto';
          this.style.height = (this.scrollHeight) + 'px';
        });
      }

      // Submissão Visual e Redirecionamento
      const form = document.getElementById('formVisitantePremium');
      if (form) {
        form.addEventListener('submit', (e) => {
          e.preventDefault();
          const btn = form.querySelector('.btn-submit');

          btn.textContent = 'ENVIANDO...';
          btn.style.opacity = '0.8';
          btn.disabled = true;

          setTimeout(() => {
            window.location.href = 'agradecimento-visitante.html';
          }, 800);
        });
      }
    });
  </script>
</body>

</html>
